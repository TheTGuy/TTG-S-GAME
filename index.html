<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTG's Games</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="site-wrap">
  <header>
    <h1>TTG's Games</h1>
    <p>Pick a game and play</p>
  </header>
  <main class="card-grid">
    <a href="game/index.html" class="card">
      <div class="card-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="40" height="40" rx="4" fill="#e8e8e8"/>
          <rect x="10" y="28" width="8" height="12" rx="1" fill="#555"/>
          <rect x="20" y="20" width="8" height="20" rx="1" fill="#555"/>
          <rect x="30" y="24" width="8" height="16" rx="1" fill="#555"/>
          <circle cx="14" cy="20" r="4" fill="#333"/>
          <circle cx="24" cy="13" r="4" fill="#333"/>
          <circle cx="34" cy="17" r="4" fill="#333"/>
          <path d="M10 20 Q14 14 24 13 Q34 12 38 17" stroke="#777" stroke-width="1.5" fill="none" stroke-dasharray="2,2"/>
        </svg>
      </div>
      <div class="card-text">
        <h2>Tower Defense</h2>
        <p>Place towers, stop the waves</p>
      </div>
      <span class="card-arrow">→</span>
    </a>
    <div class="card card-soon">
      <div class="card-icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="40" height="40" rx="4" fill="#f0f0f0"/>
          <text x="24" y="30" font-size="20" text-anchor="middle" fill="#bbb">?</text>
        </svg>
      </div>
      <div class="card-text">
        <h2>More Coming Soon</h2>
        <p>Something new is on the way</p>
      </div>
    </div>
  </main>
</div>
</body>
</html>
